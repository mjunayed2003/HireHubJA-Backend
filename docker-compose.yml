version: "3.9"

services:
  db:
    image: postgres:latest
    container_name: my-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres          
      POSTGRES_PASSWORD: 123456       
      POSTGRES_DB: hirehubja            
    ports:
      - "5432:5432"                   
    volumes:
      - db_data:/var/lib/postgresql/data  

volumes:
  db_data: